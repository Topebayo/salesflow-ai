<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesFlow AI | Agent Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        /* Modern Dashboard Specific Styles */
        body {
            background-color: #0f1115;
            /* Deep dark background */
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 2.5rem 3rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 2rem;
            color: #fff;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.5;
            }
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(79, 172, 254, 0.3);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .icon-blue {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
        }

        .icon-purple {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .icon-green {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Tables & Lists */
        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 1rem;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .badge {
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: #64748b;
        }

        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(79, 172, 254, 0.2);
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Hamburger Menu Toggle */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
            background: rgba(79, 172, 254, 0.15);
            border: 1px solid rgba(79, 172, 254, 0.3);
            color: #4facfe;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        /* Sidebar overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }

        /* ==================== TABLET (768px and below) ==================== */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -280px;
                height: 100vh;
                z-index: 999;
                width: 260px;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .main-content {
                padding: 1.5rem;
                padding-top: 4.5rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .stat-card {
                padding: 1.2rem;
            }

            /* Scrollable table */
            .panel {
                overflow-x: auto;
                padding: 1rem;
            }

            table {
                min-width: 600px;
            }

            th,
            td {
                padding: 0.75rem;
                font-size: 0.8rem;
            }
        }

        /* ==================== MOBILE (480px and below) ==================== */
        @media (max-width: 480px) {
            .main-content {
                padding: 1rem;
                padding-top: 4rem;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .stat-card {
                flex-direction: row;
                align-items: center;
                padding: 1rem;
                gap: 1rem;
            }

            .stat-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .stat-value {
                font-size: 1.5rem;
                margin: 0;
            }

            .stat-label {
                font-size: 0.8rem;
            }

            .section-title {
                font-size: 1rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>

<body>

    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <i class="fa-solid fa-robot"></i>
            SalesFlow AI
        </div>
        <nav class="nav-items">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="#" class="nav-item">
                <i class="fa-brands fa-whatsapp"></i> Chat Logs
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i> Settings
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>Agent Overview</h1>
                <p style="color: #94a3b8; margin-top: 5px;">Monitor Temitope's AI real-time sales performance.</p>
            </div>
            <div class="status-badge" id="apiStatus">
                <div class="status-dot"></div>
                Agent Active
            </div>
        </header>

        <div class="loader" id="loader"></div>

        <div id="dashboardContent" style="display: none;">
            <!-- Key Metrics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon icon-blue">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div class="stat-value" id="valLeads">0</div>
                    <div class="stat-label">Total Leads Captured</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon icon-purple">
                        <i class="fa-solid fa-message"></i>
                    </div>
                    <div class="stat-value" id="valActiveChats">0</div>
                    <div class="stat-label">Active Conversations</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon icon-green">
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <div class="stat-value" id="valTotalMsgs">0</div>
                    <div class="stat-label">Total Messages Sent/Received</div>
                </div>
            </div>

            <!-- Recent Leads Table -->
            <h2 class="section-title">
                Recent WhatsApp Leads
                <button onclick="fetchData()"
                    style="background: none; border: none; color: #4facfe; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                    <i class="fa-solid fa-rotate-right"></i> Refresh
                </button>
            </h2>
            <div class="panel">
                <table id="leadsTable">
                    <thead>
                        <tr>
                            <th>Phone Number</th>
                            <th>Name</th>
                            <th>Total Messages</th>
                            <th>First Contact</th>
                            <th>Last Active</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="leadsBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
    <script src="dashboard.js"></script>
</body>

</html>
