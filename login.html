<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesFlow AI | Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        lightgreen: '#e6f4ea',
                        brandgreen: '#10b981',
                        darkgreen: '#064e3b',
                        offwhite: '#f8f9fa'
                    }
                }
            }
        }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="bg-offwhite text-gray-800 antialiased flex items-center justify-center min-h-screen p-4" style="background-image: radial-gradient(circle at 50% -20%, rgba(16,185,129, 0.1), transparent 50%);">

    <div class="bg-white border border-gray-200 rounded-2xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] p-8 sm:p-10 w-full max-w-md relative z-10">
        <div class="font-display font-bold text-3xl text-center mb-8 text-gray-900 tracking-tight flex items-center justify-center gap-2">
            <i class="fa-solid fa-comments-dollar text-brandgreen"></i> SalesFlow<span class="text-brandgreen">AI</span>
        </div>

        <div id="errorMessage" class="text-red-600 bg-red-50 border border-red-200 p-3 rounded-lg text-sm mb-6 text-center hidden"></div>

        <form id="authForm" class="space-y-5">
            <div id="nameGroup" style="display: none;">
                <label class="block mb-2 text-sm font-medium text-gray-700">Business Name</label>
                <input type="text" id="businessName" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brandgreen/20 focus:border-brandgreen outline-none transition-all" placeholder="e.g. SalesFlow Properties">
            </div>

            <div>
                <label class="block mb-2 text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brandgreen/20 focus:border-brandgreen outline-none transition-all" placeholder="admin@business.com">
            </div>

            <div id="passwordGroup">
                <label class="block mb-2 text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brandgreen/20 focus:border-brandgreen outline-none transition-all" placeholder="••••••••">
                <div class="text-right mt-2" id="forgotPasswordLinkContainer">
                    <a href="#" onclick="toggleForgotPasswordMode()" class="text-brandgreen hover:text-darkgreen text-sm font-medium transition-colors">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 mt-2 bg-gray-900 hover:bg-gray-800 text-white rounded-xl font-semibold text-base shadow-lg shadow-gray-900/20 transition-all active:scale-[0.98]" id="submitBtn">Sign In</button>
        </form>

        <div class="text-center mt-8 text-sm text-gray-500" id="authSwitchContainer">
            <span id="switchText">Don't have an account?</span> 
            <a onclick="toggleAuthMode()" id="switchLink" class="text-brandgreen font-semibold cursor-pointer hover:underline">Create one</a>
        </div>
        
        <div class="text-center mt-8 text-sm" id="backToLoginContainer" style="display: none;">
            <a onclick="toggleAuthMode()" class="text-gray-500 cursor-pointer hover:text-gray-800 font-medium transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Login</a>
        </div>
    </div>

    <script>
        // Supabase Initialization
        // NOTE: In production, these should be dynamically injected or kept in a config file
        const SUPABASE_URL = 'https://jmifkdmrybjueiipkqru.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptaWZrZG1yeWJqdWVpaXBrcXJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjI0MDAsImV4cCI6MjA5NDA5ODQwMH0.Ft8iqBoeDzkpaxfnn7p4sxKpdq3uDy0GVW_O1LnQALk';
        
        // Only initialize if keys are provided to avoid errors
        let supabaseClient = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE') {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        let isSignUp = false;
        let isForgotPassword = false;
        let isRecoveryMode = false;
        
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            isForgotPassword = false;
            
            document.getElementById('nameGroup').style.display = isSignUp ? 'block' : 'none';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('forgotPasswordLinkContainer').style.display = isSignUp ? 'none' : 'block';
            
            document.getElementById('submitBtn').innerText = isSignUp ? 'Create Account' : 'Sign In';
            
            document.getElementById('authSwitchContainer').style.display = 'block';
            document.getElementById('backToLoginContainer').style.display = 'none';
            
            document.getElementById('switchText').innerText = isSignUp ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('switchLink').innerText = isSignUp ? 'Sign In' : 'Create one';
            
            document.getElementById('errorMessage').style.display = 'none';
        }

        function toggleForgotPasswordMode() {
            isForgotPassword = true;
            isSignUp = false;
            
            document.getElementById('nameGroup').style.display = 'none';
            document.getElementById('passwordGroup').style.display = 'none';
            
            document.getElementById('submitBtn').innerText = 'Send Reset Link';
            
            document.getElementById('authSwitchContainer').style.display = 'none';
            document.getElementById('backToLoginContainer').style.display = 'block';
            
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function showRecoveryMode() {
            isRecoveryMode = true;
            document.getElementById('nameGroup').style.display = 'none';
            // Hide email input, only show password input for the new password
            document.getElementById('email').parentElement.style.display = 'none';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('passwordGroup').querySelector('label').innerText = "New Password";
            document.getElementById('password').placeholder = "Enter new password";
            document.getElementById('forgotPasswordLinkContainer').style.display = 'none';
            
            document.getElementById('submitBtn').innerText = 'Update Password';
            
            document.getElementById('authSwitchContainer').style.display = 'none';
            document.getElementById('backToLoginContainer').style.display = 'none';
            
            document.getElementById('errorMessage').style.display = 'none';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const businessName = document.getElementById('businessName').value;
            const errorEl = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!supabaseClient) {
                errorEl.innerText = "Supabase keys not configured in login.html yet!";
                errorEl.style.display = 'block';
                return;
            }

            submitBtn.innerText = 'Loading...';
            submitBtn.disabled = true;
            errorEl.style.display = 'none';

            try {
                if (isRecoveryMode) {
                    // Update Password Logic
                    if (!password) throw new Error("Please enter a new password");
                    
                    const { error } = await supabaseClient.auth.updateUser({
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    alert("Password updated successfully! Redirecting to dashboard...");
                    window.location.href = 'dashboard.html';
                    return;
                }
                
                if (isForgotPassword) {
                    // Send Reset Link Logic
                    if (!email) throw new Error("Email is required for password reset");
                    
                    // Use clean URL without any existing hashes to prevent ## in the email link
                    const cleanUrl = window.location.origin + window.location.pathname;
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                        redirectTo: cleanUrl
                    });
                    
                    if (error) throw error;
                    
                    alert("📧 Password reset link sent from SalesFlow AI (NexisFlow)!\n\nPlease check your email inbox (or spam folder) for the secure verification link.");
                    isSignUp = true; // Flips it so toggle goes back to login
                    toggleAuthMode(); 
                    return;
                }

                if (isSignUp) {
                    // Sign Up Logic
                    if (!businessName) throw new Error("Business name is required");
                    if (!password) throw new Error("Password is required");
                    
                    const { data, error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: {
                            data: {
                                business_name: businessName
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    // Create business record in our new table
                    if (data.user) {
                        const { error: dbError } = await supabaseClient
                            .from('businesses')
                            .insert([
                                { 
                                    owner_id: data.user.id, 
                                    name: businessName,
                                    bot_mode: 'retail'
                                }
                            ]);
                            
                        if (dbError) console.error("Error creating business profile:", dbError);
                    }
                    
                    alert("🎉 Welcome to SalesFlow AI by NexisFlow!\n\nYour account has been created successfully. If email verification is enabled on your cloud cluster, please check your inbox (from SalesFlow AI / NexisFlow) and click the verification link to activate your 24/7 AI agent.");
                    isSignUp = true;
                    toggleAuthMode(); // Switch back to login
                    
                } else {
                    // Login Logic
                    if (!email) throw new Error("Email is required");
                    if (!password) throw new Error("Password is required");
                    
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email,
                        password
                    });
                    
                    if (error) throw error;
                    
                    // Redirect to dashboard on success
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                errorEl.innerText = error.message;
                errorEl.style.display = 'block';
            } finally {
                if (isRecoveryMode) {
                    submitBtn.innerText = 'Update Password';
                } else if (isForgotPassword) {
                    submitBtn.innerText = 'Send Reset Link';
                } else {
                    submitBtn.innerText = isSignUp ? 'Create Account' : 'Sign In';
                }
                submitBtn.disabled = false;
            }
        });
        
        // Check if already logged in or recovering password
        async function checkSession() {
            if (!supabaseClient) return;
            
            // 1. Listen for the official password recovery event
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    showRecoveryMode();
                }
            });
            
            // 2. Check for newer PKCE secure flow (?code=...)
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
                if (error) {
                    alert("Reset link invalid: " + error.message);
                } else {
                    showRecoveryMode();
                }
                // Clear the URL so refreshing doesn't cause errors
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }
            
            // 3. Fetch the current session
            const { data } = await supabaseClient.auth.getSession();
            
            // 4. Fallback for older implicit flow (#access_token=...)
            if (window.location.hash.includes('type=recovery')) {
                if (data.session) {
                    showRecoveryMode();
                } else {
                    alert("This password reset link is invalid or has expired. Please request a new one.");
                }
                return;
            }
            
            // Only redirect if logged in normally and not recovering
            setTimeout(() => {
                if (data.session && !isRecoveryMode) {
                    window.location.href = 'dashboard.html';
                }
            }, 500);
        }
        
        checkSession();
    </script>
</body>
</html>
